<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Travel Website</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .forgot-container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
      max-width: 400px;
      width: 100%;
    }

    .forgot-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      background-color: #ffc107;
      border: none;
      color: black;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #e0a800;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1rem;
      color: #007bff;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="forgot-container">
    <h2>Forgot Password</h2>
    <form onsubmit="return fakeReset()">
      <div class="form-group">
        <input type="email" id="resetEmail" placeholder="Enter your email" required />
      </div>
      <button type="submit">Send Reset Link</button>
      <a href="login.html" class="back-link">← Back to Login</a>
    </form>
  </div>

  <script>
    function fakeReset() {
      const email = document.getElementById("resetEmail").value;
      if (!email) {
        alert("Please enter your email.");
        return false;
      }
      alert("Reset link sent to " + email + " (just for demo).");
      return false;
    }
  </script>
</body>
</html>
